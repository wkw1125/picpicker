name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build PicPicker-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows-x64
            icon_file: logo.ico
          - os: macos-15
            platform: macOS-arm64
            icon_file: logo.icns

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.16"
          python-version: "3.11"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --group build

      - name: Generate application version
        shell: bash
        run: |
          printf 'VERSION = "%s"\n' \
            "${{ steps.version.outputs.value }}" \
            > picpicker/_build_version.py

      - name: Build application
        run: >-
          uv run --no-sync pyinstaller
          --noconfirm
          --clean
          --windowed
          --name PicPicker
          --icon ${{ matrix.icon_file }}
          --add-data "logo.png:."
          --collect-all tkinterdnd2
          picpicker/main.py

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Compress-Archive -Path dist/PicPicker -DestinationPath package/PicPicker-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip

      - name: Package macOS application
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          ditto -c -k --sequesterRsrc --keepParent dist/PicPicker.app package/PicPicker-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: PicPicker-${{ steps.version.outputs.value }}-${{ matrix.platform }}
          path: package/PicPicker-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v4
        with:
          pattern: PicPicker-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*.zip
          --verify-tag
          --title "PicPicker ${GITHUB_REF_NAME}"
          --generate-notes
